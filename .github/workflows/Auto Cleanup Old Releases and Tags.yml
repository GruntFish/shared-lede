name: Cleanup Old Releases and Tags

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: 'Number of latest releases to keep'
        required: false
        default: '5'
        type: string
  schedule:
    # 每周一凌晨3点自动运行清理（可选）
    - cron: '0 3 * * 1'

permissions:
  contents: write

jobs:
  cleanup_releases:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Cleanup old Releases and Tags
        uses: actions/github-script@v7
        with:
          script: |
            const keepLatest = parseInt(process.env.KEEP_LATEST);
            console.log(`Keeping ${keepLatest} latest releases`);

            // 获取所有releases，按创建时间降序排列
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            console.log(`Found ${releases.data.length} total releases`);

            // 筛选成功的release（有assets或tagged_at）
            const successfulReleases = releases.data.filter(release => 
              release.assets.length > 0 || release.created_at
            );

            console.log(`Found ${successfulReleases.length} successful releases`);

            // 要删除的releases（保留最新的keepLatest个）
            const releasesToDelete = successfulReleases.slice(keepLatest);

            if (releasesToDelete.length === 0) {
              console.log('No old releases to delete');
              return;
            }

            console.log(`Preparing to delete ${releasesToDelete.length} old releases`);

            // 批量删除releases和对应的tags
            for (const release of releasesToDelete) {
              try {
                console.log(`Deleting release: ${release.name || release.tag_name}`);
                
                // 删除release
                await github.rest.repos.deleteRelease({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  release_id: release.id
                });

                // 删除对应的tag
                await github.rest.git.deleteRef({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  ref: `tags/${release.tag_name}`
                });

                console.log(`✅ Successfully deleted release and tag: ${release.tag_name}`);
                
                // 添加延迟避免触发API限制
                await new Promise(resolve => setTimeout(resolve, 500));
                
              } catch (error) {
                console.log(`⚠️ Failed to delete ${release.tag_name}: ${error.message}`);
              }
            }

            console.log('🎉 Cleanup completed!');
          env:
            KEEP_LATEST: ${{ inputs.keep_latest || '5' }}
