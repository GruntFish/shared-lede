name: Cleanup Failed Releases Only

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: 'Number of latest SUCCESSFUL releases to keep'
        required: false
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Delete Old and Failed Releases
        uses: actions/github-script@v7
        with:
          script: |
            const keepLatest = parseInt('${{ inputs.keep_latest || '5' }}');
            
            // 获取所有 releases
            const releases = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            console.log(`Total releases: ${releases.data.length}`);

            // 筛选成功的release（有资源文件的）
            const successfulReleases = releases.data.filter(release => 
              release.assets && release.assets.length > 0
            );

            console.log(`Successful releases: ${successfulReleases.length}`);
            console.log(`Keeping latest ${keepLatest} successful releases`);

            // 处理每个release
            for (let i = 0; i < releases.data.length; i++) {
              const release = releases.data[i];
              const isSuccessful = release.assets && release.assets.length > 0;
              
              // 检查是否在要保留的成功release中
              const successfulIndex = successfulReleases.findIndex(r => r.id === release.id);
              const shouldKeep = isSuccessful && successfulIndex < keepLatest;
              
              if (shouldKeep) {
                console.log(`✅ Keeping successful release: ${release.tag_name}`);
              } else {
                try {
                  console.log(`🗑️ Deleting: ${release.tag_name} (${isSuccessful ? 'old successful' : 'failed'})`);
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: release.id
                  });
                  console.log(`✅ Deleted: ${release.tag_name}`);
                } catch (error) {
                  console.log(`❌ Failed to delete ${release.tag_name}: ${error.message}`);
                }
              }
            }
            
            console.log('🎉 Cleanup completed!');
