name: Auto-Clean

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: 'Number of latest successful releases to keep'
        required: false
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Old and Failed Releases
        uses: actions/github-script@v7
        with:
          script: |
            const keepLatest = parseInt('${{ inputs.keep_latest }}') || 5;
            
            // Get all releases
            const response = await github.rest.repos.listReleases({
              owner: context.repo.owner,
              repo: context.repo.repo,
              per_page: 100
            });

            const allReleases = response.data;
            console.log(`📦 Found ${allReleases.length} total releases`);

            // Filter successful releases (with assets)
            const successfulReleases = allReleases.filter(release => 
              release.assets && release.assets.length > 0
            );

            console.log(`✅ Successful releases: ${successfulReleases.length}`);
            console.log(`💾 Keeping latest ${keepLatest} successful releases`);

            let deletedCount = 0;
            let keptCount = 0;

            // Process each release
            for (const release of allReleases) {
              const isSuccessful = release.assets && release.assets.length > 0;
              const successfulIndex = successfulReleases.findIndex(r => r.id === release.id);
              const shouldKeep = isSuccessful && successfulIndex < keepLatest;

              if (shouldKeep) {
                console.log(`🔒 KEEPING: ${release.tag_name}`);
                keptCount++;
              } else {
                try {
                  console.log(`🗑️ DELETING: ${release.tag_name} (${isSuccessful ? 'old successful' : 'failed'})`);
                  await github.rest.repos.deleteRelease({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    release_id: release.id
                  });
                  console.log(`✅ DELETED: ${release.tag_name}`);
                  deletedCount++;
                } catch (error) {
                  console.log(`❌ FAILED to delete ${release.tag_name}: ${error.message}`);
                }
              }
            }

            console.log(`🎉 Cleanup completed! Kept: ${keptCount}, Deleted: ${deletedCount}`);
