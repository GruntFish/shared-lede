name: Auto-Clean

on:
  workflow_dispatch:
    inputs:
      keep_latest:
        description: '保留最近几个成功的Release'
        required: false
        default: '5'
        type: string

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - name: Cleanup Old Releases
        uses: actions/github-script@v7
        with:
          script: |
            try {
              const keepLatest = parseInt('${{ inputs.keep_latest }}') || 5;
              console.log(`🚀 开始清理，保留最近 ${keepLatest} 个成功的Release`);

              // 获取所有release
              const releases = await github.rest.repos.listReleases({
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100
              });

              console.log(`📦 总共找到 ${releases.data.length} 个Release`);

              if (releases.data.length === 0) {
                console.log('✅ 没有需要清理的Release');
                return;
              }

              // 按创建时间排序
              const sortedReleases = releases.data.sort((a, b) => 
                new Date(b.created_at) - new Date(a.created_at)
              );

              let kept = 0;
              let deleted = 0;

              for (const release of sortedReleases) {
                const hasAssets = release.assets && release.assets.length > 0;
                
                if (hasAssets && kept < keepLatest) {
                  console.log(`✅ 保留: ${release.tag_name} (有资源文件)`);
                  kept++;
                } else {
                  try {
                    console.log(`🗑️ 删除: ${release.tag_name} (${hasAssets ? '旧的成功Release' : '失败的Release'})`);
                    await github.rest.repos.deleteRelease({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      release_id: release.id
                    });
                    deleted++;
                  } catch (error) {
                    console.log(`❌ 删除失败 ${release.tag_name}: ${error.message}`);
                  }
                }
              }

              console.log(`🎉 清理完成! 保留: ${kept}个, 删除: ${deleted}个`);

            } catch (error) {
              console.log('💥 发生错误:', error);
              core.setFailed(error.message);
            }
